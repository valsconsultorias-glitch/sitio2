<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusTraveller - Concursos de Empleo Público</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="header">
        <div class="nav-container">
            <div class="logo">
                Bus<span class="logo-bold">Traveller</span>
            </div>

            <nav class="navigation">
                <a href="#" class="nav-link">HOME</a>
                <a href="#" class="nav-link">ABOUT</a>
                <a href="#" class="nav-link">TOUR</a>
                <a href="#" class="nav-link">PACKAGE</a>
                <a href="#" class="nav-link">CONTACT</a>
            </nav>

            <div class="action-button">
                <a href="#" class="btn-book">BOOK TRIP</a>
            </div>
        </div>
    </header>

    <main class="hero-section">
        <div class="hero-container">
            
            <div class="hero-content">
                <p class="hero-subtitle">BUS YOUR TRAVEL JOURNEY</p>
                <h1 class="hero-title">Where Every Bus Ride Feels Magical!</h1>
                
                <div class="hero-buttons">
                    <a href="#" class="btn-hero-action">Book A Trip Now</a>
                    
                    <button class="btn-play" aria-label="Ver video">
                        <svg viewBox="0 0 24 24" fill="currentColor" class="play-icon">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="hero-image-wrapper">
                <img src="ruta-de-tu-imagen/autobus.png" alt="Autobús Blanco Premium" class="hero-bus-image">
            </div>

        </div>
    </main>

</body>
</html>
